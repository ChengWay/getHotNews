name: 每日热点新闻推送
on:
  schedule:
    # UTC 8点 = 北京时间16点，自行调整cron
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖requests
        run: pip install requests

      - name: 执行新闻推送脚本
        env:
          ALAPI_TOKEN: ${{ secrets.ALAPI_TOKEN }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          WQ_CORP_ID: ${{ secrets.WQ_CORP_ID }}
          WQ_CORP_SECRET: ${{ secrets.WQ_CORP_SECRET }}
          WQ_AGENT_ID: ${{ secrets.WQ_AGENT_ID }}
        run: python main.py
